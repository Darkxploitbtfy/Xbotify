<!DOCTYPE html>
<html>
<head>
  <title>Connect Botify X</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  width: 90%;
  max-width: 360px;
  background: #111827;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 15px;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.code {
  margin-top: 15px;
  font-size: 20px;
  letter-spacing: 2px;
  color: #60a5fa;
}

.msg {
  margin-top: 10px;
  font-size: 14px;
  color: #f87171;
}
  </style>
</head>

<body>

<div class="box">
  <h2>Connect Botify X</h2>

  <input id="phone" placeholder="Enter phone (e.g 234XXXXXXXXXX)" />

  <button onclick="pair()">Generate Pairing Code</button>

  <div class="code" id="code"></div>
  <div class="msg" id="msg"></div>
</div>

<script>
async function pair() {
  const phone = document.getElementById('phone').value;
  const msg = document.getElementById('msg');
  const codeBox = document.getElementById('code');

  if (!phone) {
    msg.innerText = "Enter phone number";
    return;
  }

  msg.innerText = "Generating pairing code...";
  codeBox.innerText = "";

  try {
    const res = await fetch('/panel/api/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });

    const data = await res.json();

    console.log("PAIR RESPONSE:", data); // 🔥 DEBUG

    if (data.success && data.code) {
      codeBox.innerText = data.code;
      msg.innerText = "Enter this code on WhatsApp";
    } else {
      msg.innerText = data.message || "Failed to generate code";
    }

  } catch (err) {
    console.error(err);
    msg.innerText = "Server error. Check backend.";
  }
}
</script>
