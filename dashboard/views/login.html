<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Botify X — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#07070f;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;background-image:radial-gradient(ellipse at 50% -10%,rgba(99,102,241,.2) 0%,transparent 60%)}
.wrap{width:100%;max-width:400px;padding:16px}
.card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:22px;padding:44px 36px;box-shadow:0 0 80px rgba(99,102,241,.08)}
.logo{text-align:center;margin-bottom:38px}
.icon{width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;box-shadow:0 8px 32px rgba(99,102,241,.35)}
h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sub{font-size:13px;color:#6b7280;margin-top:4px}
.badge{display:inline-block;margin-top:9px;padding:3px 11px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:20px;font-size:11px;color:#818cf8;font-weight:600;letter-spacing:.3px}
.field{margin-bottom:17px}
label{display:block;font-size:12.5px;font-weight:500;color:#9ca3af;margin-bottom:7px;letter-spacing:.2px}
input{width:100%;background:#07070f;border:1.5px solid #1a1a2e;border-radius:11px;padding:12px 15px;font-size:14.5px;color:#f3f4f6;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.13)}
input::placeholder{color:#252540}
.btn{width:100%;padding:13.5px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:600;border:none;border-radius:11px;cursor:pointer;margin-top:4px;transition:opacity .2s,transform .1s;font-family:inherit;letter-spacing:.1px}
.btn:hover{opacity:.88}.btn:active{transform:scale(.99)}.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;font-size:12.5px;padding:10px 13px;border-radius:9px;margin-top:13px;display:none;text-align:center}
.foot{text-align:center;margin-top:24px;font-size:11.5px;color:#252540}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="icon">🤖</div>
      <h1>Botify X</h1>
      <div class="sub">WhatsApp Bot Panel</div>
      <div class="badge">v1.1.4</div>
    </div>
    <form id="frm">
      <div class="field">
        <label>USERNAME</label>
        <input id="u" type="text" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input id="p" type="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button class="btn" id="btn" type="submit">Sign In</button>
      <div class="err" id="err"></div>
    </form>
    <div class="foot">Botify X &copy; 2024 — Secure Panel</div>
  </div>
</div>
<script>
document.getElementById('frm').onsubmit=async function(e){
  e.preventDefault();
  const btn=document.getElementById('btn'),err=document.getElementById('err');
  btn.disabled=true;btn.textContent='Signing in…';err.style.display='none';
  try{
    const r=await fetch('/panel/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:document.getElementById('u').value,password:document.getElementById('p').value})});
    const d=await r.json();
    if(d.success){window.location.href=d.redirect;}
    else{err.textContent=d.message||'Login failed.';err.style.display='block';}
  }catch{err.textContent='Network error. Please try again.';err.style.display='block';}
  btn.disabled=false;btn.textContent='Sign In';
};
</script>
</body>
</html>
